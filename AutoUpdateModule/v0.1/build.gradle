plugins {
    id 'java-library'
}

group = 'com.huangzuan'
version = '0.1.0'

repositories {
    mavenCentral()
}

dependencies {
    // JSON 解析
    implementation 'org.json:json:20230227'
}

java {
    withJavadocJar()
    withSourcesJar()
}

tasks.jar {
    manifest {
        attributes(
            'Implementation-Title': 'AutoUpdateModule',
            'Implementation-Version': version
        )
    }
}